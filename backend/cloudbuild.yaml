steps:
  # Build the Docker image using the Dockerfile in this directory
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$COMMIT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest
      - .

  # Push both the commit-tagged and latest images
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$COMMIT_SHA]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vaidyaai
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --set-env-vars=NODE_ENV=production,VERTEX_AI_PROJECT_ID=$PROJECT_ID,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-pro,ALLOWED_ORIGINS=https://vaidhya-ai.web.app

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
