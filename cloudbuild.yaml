steps:
  # ── Step 1: Build full-stack image from repo root ─────────────────
  # Build context = repo root so Dockerfile can access both
  # backend/ (Node.js source) and frontend files (HTML/CSS/JS)
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - --file=backend/Dockerfile
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$SHORT_SHA
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest
      - .

  # ── Step 2: Push both tags ────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    waitFor: [build]
    args: [push, europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$SHORT_SHA]

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: [build]
    args: [push, europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest]

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push-sha]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vaidyaai
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$SHORT_SHA
      - --region=europe-west1
      - --platform=managed
      - --set-env-vars=NODE_ENV=production,VERTEX_AI_PROJECT_ID=$PROJECT_ID,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-pro,ALLOWED_ORIGINS=https://vaidyaai-565232619347.europe-west1.run.app

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:$SHORT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/vaidyaai/backend:latest

options:
  logging: CLOUD_LOGGING_ONLY
